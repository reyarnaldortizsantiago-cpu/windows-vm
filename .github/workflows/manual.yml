name: Windows VM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download ngrok
        run: choco install ngrok -y

      - name: Set ngrok token
        run: ngrok config add-authtoken 3DfjDrFbLi3F2YVzBmRw6wnVrfJ_Ke9xCipMN7xMZUcKrPDo

      - name: Create/Reset RDP User
        shell: cmd
        run: |
          net user runneradmin NewPass456!
          net localgroup administrators runneradmin /add
          exit /b 0

      - name: Start ngrok tunnel
        shell: powershell
        run: |
          Start-Process ngrok -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 15
          Invoke-RestMethod http://127.0.0.1:4040/api/tunnels

      - name: Keep alive
        shell: cmd
        run: ping -t localhost
