name: Windows VM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download ngrok
        run: choco install ngrok -y

      - name: Set ngrok token
        run: ngrok config add-authtoken TU_TOKEN

      - name: Configure RDP
        shell: cmd
        run: |
          net user runneradmin MyWin2026!
          net localgroup administrators runneradmin /add || exit /b 0
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes

      - name: Start ngrok
        shell: powershell
        run: |
          Start-Process ngrok -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 20
          Invoke-RestMethod http://127.0.0.1:4040/api/tunnels

      - name: Keep alive
        shell: cmd
        run: ping -t localhost
